version: '3.8'

services:
  backend-mcp:
    build: 
      context: ./backend-mcp
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - CAD_ENGINE_URL=http://cad-engine:5000/api/cad
      - LLM_SERVICE_URL=http://llm-service:8001/api/v1/parse
    depends_on:
      - cad-engine
      - llm-service

  llm-service:
    build:
      context: ./llm-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env

  cad-engine:
    build:
      context: ./cad-engine
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
      
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend-mcp
