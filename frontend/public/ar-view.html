<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Tesseract AR Viewer</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #000; font-family: sans-serif; }

      #overlay {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        padding: 16px;
        pointer-events: none;
      }

      #status-bar {
        background: rgba(0,0,0,0.75);
        color: white;
        padding: 10px 20px;
        border-radius: 20px;
        font-size: 14px;
        text-align: center;
        border: 1px solid rgba(74,158,255,0.4);
        pointer-events: none;
      }

      #info-card {
        display: none;
        background: rgba(0,0,0,0.8);
        color: white;
        padding: 14px 20px;
        border-radius: 14px;
        font-size: 13px;
        border: 1px solid #4a9eff;
        min-width: 220px;
        pointer-events: none;
      }

      #info-card .part-name {
        font-size: 16px;
        font-weight: bold;
        color: #4a9eff;
        margin-bottom: 8px;
      }

      #info-card .metric {
        display: flex;
        justify-content: space-between;
        margin: 4px 0;
        gap: 20px;
      }

      #info-card .metric span:last-child {
        color: #4a9eff;
        font-weight: bold;
      }

      #bottom-bar {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        padding: 16px;
      }

      #load-btn {
        background: #4a9eff;
        color: white;
        border: none;
        padding: 14px 36px;
        border-radius: 30px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(74,158,255,0.5);
        width: 80%;
        max-width: 320px;
      }

      #load-btn:active {
        transform: scale(0.97);
        background: #2a7edf;
      }

      #marker-hint {
        color: rgba(255,255,255,0.6);
        font-size: 12px;
        text-align: center;
      }

      #loading-spinner {
        display: none;
        color: #4a9eff;
        font-size: 14px;
        text-align: center;
        animation: pulse 1s infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
    </style>
  </head>
  <body>

    <div id="overlay">
      <div id="status-bar">
        Point camera at the Hiro marker to place CAD model
      </div>
      <div id="info-card">
        <div class="part-name" id="card-name">-</div>
        <div class="metric">
          <span>Volume</span>
          <span id="card-volume">-</span>
        </div>
        <div class="metric">
          <span>Surface Area</span>
          <span id="card-surface">-</span>
        </div>
        <div class="metric">
          <span>Mass</span>
          <span id="card-mass">-</span>
        </div>
        <div class="metric">
          <span>Material</span>
          <span id="card-material">-</span>
        </div>
      </div>
    </div>

    <div id="bottom-bar">
      <div id="loading-spinner">Generating CAD geometry...</div>
      <button id="load-btn" onclick="promptAndLoad()">
        Generate Shape in AR
      </button>
      <div id="marker-hint">
        Print the Hiro marker and point your camera at it
      </div>
    </div>

    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
      renderer="logarithmicDepthBuffer: true; precision: medium;"
      vr-mode-ui="enabled: false"
      loading-screen="enabled: false">

      <a-marker preset="hiro" id="main-marker">
        <a-entity id="cad-root" position="0 0 0">

          <a-box
            id="ar-shape"
            position="0 0.5 0"
            width="1" height="1" depth="1"
            color="#4a9eff"
            material="metalness: 0.6; roughness: 0.3; opacity: 0.9"
            shadow="receive: true">
          </a-box>

          <a-text
            id="ar-label"
            value="CAD Model"
            position="0 1.3 0"
            align="center"
            color="white"
            width="4"
            scale="1.2 1.2 1.2">
          </a-text>

          <a-ring
            position="0 0.01 0"
            rotation="-90 0 0"
            radius-inner="0.6"
            radius-outer="0.65"
            color="#4a9eff"
            opacity="0.5">
          </a-ring>

        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const STATUS = document.getElementById('status-bar');
      const INFO_CARD = document.getElementById('info-card');
      const SPINNER = document.getElementById('loading-spinner');
      const BTN = document.getElementById('load-btn');
      const AR_SHAPE = document.getElementById('ar-shape');
      const AR_LABEL = document.getElementById('ar-label');

      const MATERIAL_COLORS = {
        steel: '#7a9ab5',
        aluminum: '#b0c4d8',
        plastic: '#ff6644',
        concrete: '#9a9a8a',
        wood: '#c4894a',
        default: '#4a9eff'
      };

      const SHAPE_GEOMETRIES = {
        cylinder: 'a-cylinder',
        sphere: 'a-sphere',
        cone: 'a-cone',
        torus: 'a-torus',
        box: 'a-box'
      };

      let markerVisible = false;

      document.getElementById('main-marker').addEventListener('markerFound', () => {
        markerVisible = true;
        STATUS.textContent = 'Marker found! CAD model is placed.';
        STATUS.style.borderColor = '#00ff88';
      });

      document.getElementById('main-marker').addEventListener('markerLost', () => {
        markerVisible = false;
        STATUS.textContent = 'Point camera at the Hiro marker';
        STATUS.style.borderColor = 'rgba(74,158,255,0.4)';
      });

      function extractCadData(response) {
        if (response.step_b64) return response;
        if (response.result?.data?.step_b64) return response.result.data;
        if (response.data?.step_b64) return response.data;
        if (response.result?.step_b64) return response.result;
        return null;
      }

      function updateARShape(cadData) {
        const bbox = cadData.bounding_box || [0,0,0,5,5,5];
        const xSize = Math.abs(bbox[3] - bbox[0]);
        const ySize = Math.abs(bbox[4] - bbox[1]);
        const zSize = Math.abs(bbox[5] - bbox[2]);
        const maxDim = Math.max(xSize, ySize, zSize, 0.1);
        const scale = 1.5 / maxDim;
        const w = Math.max(xSize * scale, 0.1).toFixed(3);
        const h = Math.max(ySize * scale, 0.1).toFixed(3);
        const d = Math.max(zSize * scale, 0.1).toFixed(3);

        AR_SHAPE.setAttribute('width', w);
        AR_SHAPE.setAttribute('height', h);
        AR_SHAPE.setAttribute('depth', d);
        AR_SHAPE.setAttribute('position', `0 ${(parseFloat(h)/2).toFixed(3)} 0`);

        const color = MATERIAL_COLORS[cadData.material] || MATERIAL_COLORS.default;
        AR_SHAPE.setAttribute('color', color);

        const displayName = (cadData.name || 'shape').replace(/_/g,' ').toUpperCase();
        AR_LABEL.setAttribute('value', displayName);

        document.getElementById('card-name').textContent = displayName;
        document.getElementById('card-volume').textContent =
          (cadData.volume_m3 || 0).toFixed(4) + ' m³';
        document.getElementById('card-surface').textContent =
          (cadData.surface_area_m2 || 0).toFixed(2) + ' m²';
        document.getElementById('card-mass').textContent =
          (cadData.mass_kg || 0).toFixed(2) + ' kg';
        document.getElementById('card-material').textContent =
          (cadData.material || 'steel').charAt(0).toUpperCase() +
          (cadData.material || 'steel').slice(1);

        INFO_CARD.style.display = 'block';
      }

      async function promptAndLoad() {
        const shapeName = prompt(
          'What CAD shape do you want in AR?\n\nExamples:\n' +
          '• ball bearing\n• turbine blade\n• gear\n• room\n• bolt\n• pipe'
        );
        if (!shapeName || !shapeName.trim()) return;

        BTN.disabled = true;
        BTN.textContent = 'Generating...';
        SPINNER.style.display = 'block';
        INFO_CARD.style.display = 'none';
        STATUS.textContent = 'Asking AI to generate: ' + shapeName + '...';

        try {
          const BACKEND_URL = window.location.hostname === 'localhost'
            ? 'http://localhost:8000'
            : 'http://' + window.location.hostname + ':8000';

          const response = await fetch(BACKEND_URL + '/api/v1/tools/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: 'create a ' + shapeName })
          });

          if (!response.ok) throw new Error('Server returned ' + response.status);

          const data = await response.json();
          const cadData = extractCadData(data);

          if (!cadData) {
            STATUS.textContent = 'Could not extract CAD data. Try again.';
            return;
          }

          updateARShape(cadData);
          STATUS.textContent = markerVisible
            ? 'Shape placed! Walk around to view it.'
            : 'Shape ready! Point camera at Hiro marker.';

        } catch (err) {
          STATUS.textContent = 'Error: ' + err.message;
          console.error(err);
        } finally {
          BTN.disabled = false;
          BTN.textContent = 'Generate Shape in AR';
          SPINNER.style.display = 'none';
        }
      }
    </script>
  </body>
</html>
